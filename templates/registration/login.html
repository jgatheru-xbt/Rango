{% extends "rango/base.html" %}
{% block body %}
    <h1>Login</h1>
    <form method = 'POST' action=".">
        {% csrf_token %}
        {{form.as_p}}
        <input type="submit" value = "log in" >
        <input type="hidden" name = "next" value = "{{next}}">
    </form>
    <p>
        Not a member?
        <a href="{%url 'registration_register' %}">Register</a>
    </p>
{% endblock body %}
